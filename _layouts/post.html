---
layout: default
---
<article class="post">
  <p class="post-date">{{ page.date | date: "%Y.%m.%d" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.tags %}
  <div class="tags">
    {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
  {% endif %}
  <div class="post-body">
    {{ content }}
  </div>
  <a href="{{ '/' | relative_url }}" class="back-link">← 목록으로</a>
</article>
