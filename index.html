<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이기림이그린기린그림</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f8f6;
    --ink: #1c1c1c;
    --mid: #888;
    --line: #e0e0dc;
    --spot: #4a7c59; /* 기린이 서있을 법한 풀빛 */
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── MAIN CENTER ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px 72px;
    max-width: 680px;
  }

  /* 기린 SVG */
  .giraffe {
    width: 52px;
    height: 72px;
    margin-bottom: 40px;
    opacity: .85;
  }

  /* 닉네임 — 시각적 중심 */
  .nickname {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 600;
    letter-spacing: -.02em;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  /* "기린" 부분만 색 */
  .nickname .highlight { color: var(--spot); }

  .name-sub {
    font-size: 13px;
    color: var(--mid);
    letter-spacing: .04em;
    margin-bottom: 48px;
  }

  /* 소개 */
  .bio {
    font-size: 15px;
    line-height: 1.85;
    color: #444;
    max-width: 420px;
    margin-bottom: 56px;
  }

  /* 구분선 */
  hr {
    border: none;
    border-top: 1px solid var(--line);
    width: 40px;
    margin-bottom: 32px;
  }

  /* 태그 목록 */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 56px;
  }
  .tag {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--mid);
    letter-spacing: .03em;
    transition: border-color .2s, color .2s;
  }
  .tag:hover { border-color: var(--spot); color: var(--spot); }

  /* 링크 없는 심플 상태 메시지 */
  .status {
    font-size: 13px;
    color: var(--mid);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--spot);
    flex-shrink: 0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }

  /* ── FOOTER ── */
  footer {
    padding: 28px 72px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: #bbb;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ── 오른쪽 장식 기린 (데스크탑) ── */
  .deco {
    position: fixed;
    right: 72px;
    bottom: 80px;
    opacity: .06;
    pointer-events: none;
    user-select: none;
  }
  .deco svg { width: 180px; height: 240px; }

  @media (max-width: 600px) {
    main   { padding: 60px 32px; }
    footer { padding: 24px 32px; flex-direction: column; gap: 6px; align-items: flex-start; }
    .deco  { display: none; }
  }
</style>
</head>
<body>

<main>

  <!-- 미니멀 기린 SVG -->
  <svg class="giraffe" viewBox="0 0 52 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 몸통 -->
    <rect x="14" y="30" width="22" height="24" rx="6" fill="#4a7c59"/>
    <!-- 목 -->
    <rect x="20" y="10" width="10" height="26" rx="5" fill="#4a7c59"/>
    <!-- 머리 -->
    <rect x="18" y="4" width="14" height="12" rx="5" fill="#4a7c59"/>
    <!-- 뿔(ossicone) 두 개 -->
    <rect x="21" y="0" width="3" height="6" rx="1.5" fill="#4a7c59"/>
    <rect x="28" y="0" width="3" height="6" rx="1.5" fill="#4a7c59"/>
    <!-- 눈 -->
    <circle cx="25" cy="9" r="1.5" fill="#f8f8f6"/>
    <!-- 다리 4개 -->
    <rect x="15" y="52" width="5" height="18" rx="2.5" fill="#4a7c59"/>
    <rect x="22" y="52" width="5" height="18" rx="2.5" fill="#4a7c59"/>
    <rect x="29" y="52" width="5" height="18" rx="2.5" fill="#4a7c59"/>
    <!-- 얼룩 -->
    <ellipse cx="22" cy="37" rx="4" ry="3" fill="#3a6448" opacity=".5"/>
    <ellipse cx="32" cy="44" rx="3" ry="2.5" fill="#3a6448" opacity=".5"/>
    <ellipse cx="24" cy="20" rx="2.5" ry="2" fill="#3a6448" opacity=".4"/>
  </svg>

  <h1 class="nickname">이기림이그린<span class="highlight">기린</span>그림</h1>
  <p class="name-sub">이기림 · Lee Girim</p>

  <p class="bio">
    자산운용사에서 전략기획을 합니다.<br>
    퇴근 후엔 Python으로 뭔가를 만들고,<br>
    가끔 투자를 고민하고, 드물게 여행을 갑니다.
  </p>

  <hr>

  <div class="tags">
    <span class="tag">전략기획</span>
    <span class="tag">자산운용</span>
    <span class="tag">Python</span>
    <span class="tag">ETF · 연금</span>
    <span class="tag">데이터 분석</span>
  </div>

  <p class="status">
    <span class="dot"></span>
    아직 채워가는 중인 페이지입니다
  </p>

</main>

<!-- 배경 장식용 큰 기린 -->
<div class="deco">
  <svg viewBox="0 0 52 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="14" y="30" width="22" height="24" rx="6" fill="#1c1c1c"/>
    <rect x="20" y="10" width="10" height="26" rx="5" fill="#1c1c1c"/>
    <rect x="18" y="4" width="14" height="12" rx="5" fill="#1c1c1c"/>
    <rect x="21" y="0" width="3" height="6" rx="1.5" fill="#1c1c1c"/>
    <rect x="28" y="0" width="3" height="6" rx="1.5" fill="#1c1c1c"/>
    <rect x="15" y="52" width="5" height="18" rx="2.5" fill="#1c1c1c"/>
    <rect x="22" y="52" width="5" height="18" rx="2.5" fill="#1c1c1c"/>
    <rect x="29" y="52" width="5" height="18" rx="2.5" fill="#1c1c1c"/>
    <ellipse cx="22" cy="37" rx="4" ry="3" fill="#1c1c1c"/>
    <ellipse cx="32" cy="44" rx="3" ry="2.5" fill="#1c1c1c"/>
  </svg>
</div>

<footer>
  <span>이기림이그린기린그림</span>
  <span>2026</span>
</footer>

</body>
</html>
